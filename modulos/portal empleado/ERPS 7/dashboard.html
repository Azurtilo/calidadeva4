<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Portal del Empleado</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-header">
        <div class="logo-icon" id="roleIcon">✅</div>
        <h1 class="company-name" id="welcomeTitle">¡Bienvenido!</h1>
        <p class="portal-label" id="roleLabel">Portal del Empleado — Seguridad LTDA</p>
      </div>

      <div class="credentials-hint" id="roleContent">
        <!-- contenido dinámico según rol -->
      </div>

      <div style="display:flex;flex-direction:column;gap:0.75rem;margin-top:1.5rem">
        <a href="../ERPS 8/crudliquidaciones.html"
           style="display:block;text-align:center;text-decoration:none;padding:0.65rem 1rem;
                  border-radius:8px;background:#1e293b;color:#e8eaf0;font-size:0.9rem;
                  border:1px solid #2e3248;transition:border-color 0.2s;"
           onmouseover="this.style.borderColor='#3b82f6'"
           onmouseout="this.style.borderColor='#2e3248'">
          💵 Mis liquidaciones
        </a>
        <a href="../../../index.html"
           style="display:block;text-align:center;text-decoration:none;padding:0.65rem 1rem;
                  border-radius:8px;background:#1e293b;color:#8b91a8;font-size:0.9rem;
                  border:1px solid #2e3248;">
          ← Volver al inicio
        </a>
      </div>
      <a href="login.html" class="btn-login" id="logoutBtn"
        style="display:block; text-align:center; text-decoration:none; margin-top:1.5rem;">
        Cerrar sesión
      </a>

    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
