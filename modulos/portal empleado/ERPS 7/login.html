<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal del Empleado — Seguridad LTDA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-header">
        <div class="logo-icon">🔒</div>
        <h1 class="company-name">Seguridad LTDA</h1>
        <p class="portal-label">Portal del Empleado</p>
      </div>

      <form id="loginForm">

        <div class="form-group">
          <label for="username">Usuario corporativo</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="nombre@seguridad.cl"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Ingresa tu contraseña"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="alert alert-error" id="loginError" hidden>
          Credenciales inválidas. Verifica tu usuario y contraseña.
        </div>

        <button type="submit" class="btn-login">
          Iniciar sesión
        </button>

      </form>

      <p class="help-text">¿Problemas para ingresar? Contacta a TI.</p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
