<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Roles — Seguridad LTDA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Barra de retorno al inicio -->
  <nav style="background:#1a1d27;border-bottom:1px solid #2e3248;padding:0.6rem 1.5rem;display:flex;align-items:center;gap:1rem;">
    <a href="../../index.html" style="color:#8b91a8;text-decoration:none;font-size:0.85rem;display:flex;align-items:center;gap:0.4rem;" onmouseover="this.style.color='#e8eaf0'" onmouseout="this.style.color='#8b91a8'">
      ← Inicio
    </a>
    <span style="color:#2e3248">|</span>
    <span style="color:#e8eaf0;font-size:0.85rem;font-weight:500;">🔒 Seguridad LTDA</span>
  </nav>


  <div class="dashboard-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">🛡️</div>
        <h2>Seguridad LTDA</h2>
        <p id="roleLabel">Panel Administrador</p>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="showSection('usuarios')">👥 Ver Usuarios</button>
        <button class="nav-item" onclick="showSection('crear')">➕ Crear Usuario</button>
      </nav>
      <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
    </aside>

    <!-- Contenido principal -->
    <main class="main-content">

      <!-- Bienvenida -->
      <div class="welcome-bar">
        <span id="welcomeTitle">¡Bienvenido!</span>
      </div>

      <!-- Sección: Ver usuarios -->
      <section id="section-usuarios" class="section active">
        <h2>Usuarios del sistema</h2>
        <table class="users-table">
          <thead>
            <tr>
              <th>Usuario</th>
              <th>Rol</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <!-- se llena dinámicamente -->
          </tbody>
        </table>
      </section>

      <!-- Sección: Crear usuario -->
      <section id="section-crear" class="section">
        <h2>Crear nuevo usuario</h2>
        <div class="create-form">

          <div class="form-group">
            <label for="newUsername">Usuario corporativo</label>
            <input type="text" id="newUsername" placeholder="nombre@seguridad.cl" />
          </div>

          <div class="form-group">
            <label for="newPassword">Contraseña</label>
            <input type="password" id="newPassword" placeholder="Ingresa una contraseña" />
          </div>

          <div class="form-group">
            <label for="newRole">Rol</label>
            <select id="newRole">
              <option value="empleado">Empleado</option>
              <option value="admin">Administrador</option>
              <option value="rrhh">RRHH</option>
              <option value="bodeguero">Bodeguero</option>
            </select>
          </div>

          <div class="alert alert-error" id="createError" hidden>
            Completa todos los campos.
          </div>

          <div class="alert alert-success" id="createSuccess" hidden>
            Usuario creado correctamente.
          </div>

          <button class="btn-login" onclick="createUser()">Crear usuario</button>
        </div>
      </section>

    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
